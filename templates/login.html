<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - XRPB CLASS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Elemen Lukisan Latar Belakang -->
    <div class="art-bg">
        <div class="art-1"></div>
        <div class="art-2"></div>
        <div class="art-3"></div>
    </div>

    <div class="container">
        <h1>Login</h1>
        <p>XRPB Class Management System</p>
        
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="button">Sign In</button>
        </form>
    </div>
</body>
</html>
