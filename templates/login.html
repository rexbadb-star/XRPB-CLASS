<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="art-bg"><div class="art-1"></div><div class="art-2"></div></div><div class="art-3" style="position: absolute; width: 200px; height: 200px; background: rgba(255,255,255,0.1); border-radius: 50%; bottom: 20%; left: 10%; filter: blur(50px);"></div>
    <div class="container" style="max-width: 400px;">
        <h1>Login</h1>
        <p>XRPB Class Management System</p>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="button">Sign In</button>
        </form>
        {% if error %}<p style="color: #ff4d4d;">{{ error }}</p>{% endif %}
    </div>
</body>
</html>
