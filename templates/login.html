<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - XRPB CLASS</title>
    <!-- Perhatikan tanda kutip di bawah ini, harus lengkap! -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>LOGIN DULU!</h1>
        <p>Silahkan masuk untuk mengakses fitur kelas.</p>
        <hr>
        
        <!-- Form harus pakai R: form -->
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <!-- Tipe harus password agar teks tersembunyi -->
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="button">Masuk Sekarang</button>    
        </form>
    
        {% if error %}
            <p style="color: #e74c3c; font-weight: bold; margin-top: 15px;">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
