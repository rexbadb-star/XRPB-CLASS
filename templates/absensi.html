<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="art-bg"><div class="art-1"></div><div class="art-2"></div></div>
    <div class="container">
        <h1>ABSENSI</h1>
        <form action="/absensi" method="POST">
            <input type="text" name="nama" placeholder="Nama Lengkap" required>
            <select name="keterangan">
                <option value="Hadir">Hadir</option>
                <option value="Izin">Izin</option>
                <option value="Sakit">Sakit</option>
            </select>
            <button type="submit" class="button">Kirim Absen</button>
        </form>
        <table>
            <thead><tr><th>Nama</th><th>Waktu</th><th>Ket</th>{% if session['user'] == 'Adminpanel123' %}<th>Aksi</th>{% endif %}</tr></thead>
            <tbody>
                {% for absen in data_absen %}
                <tr>
                    <td>{{ absen.nama }}</td><td>{{ absen.tanggal }}</td><td>{{ absen.keterangan }}</td>
                    {% if session['user'] == 'Adminpanel123' %}<td><a href="/hapus_absen/{{ absen.id }}" class="btn-delete">Hapus</a></td>{% endif %}
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <br><a href="/">← Kembali</a>
    </div>
</body>
</html>
